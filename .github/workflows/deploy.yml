name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # required to assume the AWS role via OIDC
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: "817685572750"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ai-engineering-gym-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Deploy
        env:
          GYM_PASSPHRASE: aislgym
          SESSION_SECRET: ${{ secrets.GYM_SESSION_SECRET }}
        run: bash scripts/deploy.sh
