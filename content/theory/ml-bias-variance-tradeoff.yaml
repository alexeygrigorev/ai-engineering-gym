id: ml-bias-variance-tradeoff
category: theory
skill: ml-fundamentals
type: knowledge
question: "What is the bias-variance tradeoff? How does it relate to overfitting and underfitting?"
difficulty: medium
status: draft
source_refs: []
sources:
  - title: "IBM — What is the bias-variance tradeoff?"
    url: "https://www.ibm.com/think/topics/bias-variance-tradeoff"
    supports: "definition of bias vs variance, the tradeoff, and how they map to underfitting/overfitting"
  - title: "GeeksforGeeks — Underfitting and Overfitting in Machine Learning"
    url: "https://www.geeksforgeeks.org/machine-learning/underfitting-and-overfitting-in-machine-learning/"
    supports: "high bias = underfitting, high variance = overfitting; symptoms and remedies"
  - title: "Alexey Grigorev — Data Science Interviews (theoretical questions)"
    url: "https://github.com/alexeygrigorev/data-science-interviews"
    supports: "canonical ML-fundamentals interview question set this item is drawn from"

answer:
  short: >
    Total prediction error on unseen data decomposes into bias, variance, and
    irreducible noise. Bias is error from wrong or overly simple assumptions — the model
    is too rigid to capture the true pattern (e.g. fitting a line to a curve). Variance is
    error from sensitivity to the specific training set — the model swings a lot if you
    resample the data because it's chasing noise. The tradeoff: making a model more
    complex (more features, depth, capacity) lowers bias but raises variance; making it
    simpler does the opposite. High bias shows up as underfitting — poor performance on
    both training and test data. High variance shows up as overfitting — great on training,
    poor on test, with a big train-test gap. The goal isn't to zero out either one but to
    find the complexity that minimizes total error on held-out data. You navigate it with
    regularization, more data, cross-validation, and simpler-vs-richer models — trading a
    little bias for a lot less variance (or vice versa).
  key_points:
    - "Expected test error = bias² + variance + irreducible error"
    - "Bias: error from overly simple/wrong assumptions — the model can't capture the true signal"
    - "Variance: error from over-sensitivity to the training set — the model fits noise and swings under resampling"
    - "High bias → underfitting: poor on both train and test"
    - "High variance → overfitting: great on train, poor on test (large train-test gap)"
    - "More complexity lowers bias but raises variance, and vice versa — pick complexity that minimizes total held-out error"
    - "Levers: regularization, more data, cross-validation, feature selection, model capacity"

follow_ups:
  - "How does adding more training data affect bias versus variance?"
  - "Which direction does regularization move you on the tradeoff?"
  - "How would you diagnose whether a model is underfitting or overfitting from its learning curves?"
  - "Do ensembles like random forests reduce bias, variance, or both?"

hints:
  - "Break the error into two competing sources — one from being too simple, one from being too sensitive to the exact data."
  - "One source shows up as bad-everywhere; the other as great-on-train-but-bad-on-test. Match each to underfitting vs overfitting."
  - "Bias = wrong/simple assumptions → underfitting (bad on train and test). Variance = fitting noise → overfitting (big train-test gap). More complexity trades bias for variance; minimize total error on held-out data."

exercises:
  - kind: mcq
    stem: "A model scores 99% on training data but 70% on the test set. What is happening?"
    options:
      - { text: "High variance — the model is overfitting", correct: true }
      - { text: "High bias — the model is underfitting" }
      - { text: "Irreducible error dominates" }
      - { text: "The model is perfectly balanced" }
    explain: "A large gap where training performance far exceeds test performance is the signature of high variance / overfitting — the model has fit noise specific to the training set."

  - kind: mcq
    stem: "You increase model complexity (more parameters/features). What typically happens to bias and variance?"
    options:
      - { text: "Bias decreases, variance increases", correct: true }
      - { text: "Bias increases, variance decreases" }
      - { text: "Both decrease with no cost" }
      - { text: "Both increase" }
    explain: "More capacity lets the model fit finer structure (lower bias) but makes it more sensitive to the specific training data (higher variance). That's the tradeoff."

  - kind: fill
    template: "High {0} causes underfitting (poor on train and test); high {1} causes overfitting (great on train, poor on test)."
    blanks: ["bias", "variance"]
    chips: ["bias", "variance", "noise", "latency"]

  - kind: recall
    front: "What is the bias-variance tradeoff in one sentence?"
    back: "Reducing bias (simplistic-model error) tends to increase variance (data-sensitivity error) and vice versa, so you choose the model complexity that minimizes total error on unseen data."

  - kind: explain
