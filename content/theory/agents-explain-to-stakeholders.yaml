id: agents-explain-to-stakeholders
category: theory
skill: agents
type: knowledge
question: "How do you explain agentic systems to non-technical stakeholders?"
difficulty: easy
status: draft
source_refs: [techeon, reddit-expdevs-agentic]
sources:
  - title: "MIT Sloan — Agentic AI, explained"
    url: "https://mitsloan.mit.edu/ideas-made-to-matter/agentic-ai-explained"
    supports: "agents execute multi-step plans and use tools to complete tasks with minimal supervision, unlike a chatbot that just answers"
  - title: "Knight First Amendment Institute — Levels of Autonomy for AI Agents"
    url: "https://knightcolumbia.org/content/levels-of-autonomy-for-ai-agents-1"
    supports: "autonomy (deciding what to do) vs. automation (executing a fixed program) framing"
  - title: "OpenAI — Guardrails and human review"
    url: "https://developers.openai.com/api/docs/guides/agents/guardrails-approvals"
    supports: "human-in-the-loop approvals for high-stakes actions as a safeguard"

answer:
  short: >
    Use the "digital coworker" analogy: you give the agent a goal, it figures out
    the steps on its own, uses the same apps and systems a person would (its tools),
    and reports back. A chatbot, by contrast, only answers questions. Draw the
    autonomy-vs-automation line: automation follows a fixed script, an agent chooses
    what to do within guardrails. Then reassure on control: guardrails on what it
    may touch, human-in-the-loop approval for high-stakes actions (sending money,
    emails, deleting records), and oversight (who the agents are, what they can
    connect to, and what they're allowed to do). Anchor it to one concrete business
    outcome and its ROI, not jargon.
  key_points:
    - "Analogy: an agent is like a digital coworker (give it a goal, it plans, uses tools, and reports back)"
    - "Contrast with a chatbot: a chatbot answers questions, while an agent takes actions in your systems to finish a task"
    - "Autonomy vs. automation: automation follows a fixed script, an agent decides what to do within limits"
    - "Reassure on control: guardrails, human-in-the-loop approval for high-stakes actions, logging and oversight"
    - "Ground it in a concrete use case and business outcome/ROI, avoiding jargon"

hints:
  - "Use an everyday analogy rather than architecture terms."
  - "Contrast 'answers questions' with 'takes actions to finish a job'."
  - "Anticipate the control/safety question by mentioning guardrails and human approval."

follow_ups:
  - "How would you explain the risk of autonomy without scaring them off?"
  - "How do you set expectations about reliability and human oversight?"
  - "What one-sentence definition would you give a CFO?"
  - "How do you tie an agent to measurable ROI?"

exercises:
  - kind: mcq
    stem: "What is the clearest one-line contrast to give a non-technical audience?"
    options:
      - { text: "A chatbot answers questions; an agent takes actions in your systems to complete a task", correct: true }
      - { text: "An agent uses a transformer and a chatbot does not" }
      - { text: "An agent has a larger context window" }
      - { text: "An agent is fine-tuned and a chatbot is not" }
    explain: "The action-taking distinction lands without jargon; architecture details don't help a non-technical stakeholder."

  - kind: mcq
    stem: "Which point best reassures stakeholders worried about control?"
    options:
      - { text: "Guardrails plus human-in-the-loop approval for high-stakes actions", correct: true }
      - { text: "The model has billions of parameters" }
      - { text: "It runs in the cloud" }
      - { text: "It uses vector search" }
    explain: "Guardrails and human approval for high-stakes actions directly address the control/safety concern."

  - kind: fill
    template: "Automation follows a fixed {0}; an agent decides what to do within {1}."
    blanks: ["script", "guardrails"]
    chips: ["script", "guardrails", "embeddings", "prompts"]

  - kind: explain
