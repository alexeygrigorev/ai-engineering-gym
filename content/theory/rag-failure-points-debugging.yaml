id: rag-failure-points-debugging
category: theory
skill: rag
type: knowledge
question: "What are common RAG failure points, and how do you debug them?"
difficulty: hard
status: draft
source_refs: [reddit-clear-genai, reddit-grilled-rag, x-athletickoder-2]
sources:
  - title: "Barnett et al. — Seven Failure Points When Engineering a Retrieval Augmented Generation System (arXiv:2401.05856)"
    url: "https://arxiv.org/abs/2401.05856"
    supports: "the seven-failure-point taxonomy: missing content, missed top-k, not in context, not extracted, wrong format, incorrect specificity, incomplete"
  - title: "ACM/IEEE CAIN 2024 — Seven Failure Points When Engineering a RAG System"
    url: "https://dl.acm.org/doi/10.1145/3644815.3644945"
    supports: "validation only feasible during operation; robustness evolves, isn't designed up front"
  - title: "Sahin Ahmed (Medium) — The Common Failure Points of LLM RAG Systems and How to Overcome Them"
    url: "https://medium.com/@sahin.samia/the-common-failure-points-of-llm-rag-systems-and-how-to-overcome-them-926d9090a88f"
    supports: "practical mitigations mapped to each failure point"

answer:
  short: >
    Debug RAG by splitting it into retrieval failures and generation failures, then
    isolating which stage broke. Barnett et al.'s "seven failure points" is a good
    map: (1) missing content: the answer isn't in the corpus at all. (2) missed
    top-k: it's in the index but ranked too low to be retrieved. (3) not in context:
    retrieved but dropped during consolidation/reranking or truncated by the
    context window. (4) not extracted: present in context but the model didn't use
    it (often noise/distraction). (5) wrong format: ignored a requested output
    format. (6) incorrect specificity: too vague or too detailed. (7) incomplete:
    misses parts even though the info was retrieved. To debug, instrument each stage:
    log the retrieved chunks and look at them independently of the LLM. If the right
    chunk isn't retrieved, the problem is upstream: chunking, embeddings, or the
    index (fix chunk size, try hybrid search, add a reranker). If the right chunk
    was retrieved but the answer is still wrong, it's a generation/prompt problem:
    context stuffing/order, prompt instructions, or the model. A key insight from the
    paper: RAG robustness can only be validated in operation, so you need
    continuous eval, not a one-time design.
  key_points:
    - "Split failures into retrieval-side vs generation-side and isolate the broken stage"
    - "Seven failure points (Barnett et al.): missing content, missed top-k ranking, not in context (consolidation/window), not extracted, wrong format, incorrect specificity, incomplete"
    - "Debug retrieval first: log and look at retrieved chunks independently of the LLM"
    - "Wrong chunk retrieved -> fix chunking, embeddings, hybrid search, reranking"
    - "Right chunk retrieved but wrong answer -> prompt/context ordering/model problem"
    - "RAG robustness is validated in operation -> continuous evaluation, not one-time design"

follow_ups:
  - "How do you tell a retrieval failure apart from a generation failure in production?"
  - "The right chunk is retrieved but the model ignores it. What do you try?"
  - "What would a RAG eval suite measure to catch these before users do?"

hints:
  - "Before naming failures, split the pipeline in half: retrieval vs generation. That framing is what interviewers want."
  - "Walk each stage: is the answer even in the corpus? indexed but ranked too low? retrieved but dropped from context? in context but ignored by the model? Each is a different fix."
  - "Reference the seven failure points (missing content, missed top-k, not in context, not extracted, wrong format, wrong specificity, incomplete). Debug by logging retrieved chunks: wrong chunk = fix retrieval, right chunk + wrong answer = fix prompt/model. Validate continuously in operation."

exercises:
  - kind: mcq
    stem: "The correct chunk IS in the retrieved context, but the model's answer is still wrong. Where do you look first?"
    options:
      - { text: "Generation side — prompt instructions, context ordering, or the model", correct: true }
      - { text: "The embedding model — retrieval clearly failed" }
      - { text: "The chunk size — it must be too small" }
      - { text: "The vector index — it returned nothing useful" }
    explain: "If the right chunk was retrieved, retrieval succeeded. A wrong answer then points to generation: the model didn't extract/use it (noise, ordering, prompt), not the retriever."

  - kind: mcq
    stem: "A user's answer exists in the corpus and is indexed, but never shows up in results. Which failure point is this?"
    options:
      - { text: "Missed top-k — it ranked too low to be retrieved", correct: true }
      - { text: "Missing content — it isn't in the corpus" }
      - { text: "Wrong format — the output format was ignored" }
      - { text: "Incomplete — the answer left parts out" }
    explain: "It's present and indexed but ranked below the cutoff — the 'missed top-k' failure. Fixes: better embeddings, hybrid search, reranking, or a larger k."

  - kind: order
    prompt: "Order a debugging workflow for a wrong RAG answer"
    steps:
      - "Reproduce the failing query"
      - "Log and inspect the retrieved chunks directly"
      - "Check whether the correct chunk was retrieved at all"
      - "If not retrieved: fix chunking / embeddings / hybrid / reranking"
      - "If retrieved: fix prompt, context ordering, or model"
      - "Add the case to a continuous eval set"

  - kind: recall
    front: "First question when debugging a wrong RAG answer?"
    back: "Was the correct chunk actually retrieved? Inspect the retrieved context directly. If no -> retrieval problem (chunking/embeddings/index/reranking). If yes -> generation problem (prompt/ordering/model)."

  - kind: explain
