id: eval-golden-dataset
category: theory
skill: evaluation
type: knowledge
question: "How do you build a golden dataset for evaluation?"
difficulty: medium
status: draft
source_refs: [proptech-founder-1]
sources:
  - key: hamel-evals-faq
    title: "Hamel Husain & Shreya Shankar — LLM Evals FAQ"
    url: "https://hamel.dev/blog/posts/evals-faq/"
    supports: "review 100+ traces to saturation, use error analysis (open/axial coding), and dimension-based synthetic data — and when to avoid it"
  - key: hamel-annotators
    title: "Hamel Husain — How many people should annotate my LLM outputs?"
    url: "https://hamel.dev/blog/posts/evals-faq/how-many-people-should-annotate-my-llm-outputs.html"
    supports: "default to one domain-expert labeler; add annotators only when needed and measure inter-annotator agreement (Cohen's kappa)"
  - key: databricks-eval-dataset
    title: "Databricks — Build evaluation datasets (MLflow)"
    url: "https://docs.databricks.com/aws/en/mlflow3/genai/eval-monitor/build-eval-dataset"
    supports: "curate from real production traces, enrich with expert labeling, version with lineage/governance, and generate synthetic data for coverage"
  - key: langsmith-eval
    title: "LangChain — LangSmith Evaluation"
    url: "https://docs.langchain.com/langsmith/evaluation"
    supports: "datasets are built from manually curated cases, historical production traces, or synthetic data"

answer:
  short: >
    A golden dataset is a curated, versioned set of representative examples with
    expected outputs (or pass/fail rubrics) that you evaluate against. Source examples
    from real production queries, logs, and traces so the distribution matches what
    users actually ask, sampling both typical and problematic (low-score) cases.
    Deliberately cover edge cases and known failure modes via error analysis — open-code
    real traces into a failure taxonomy — and aim for coverage/saturation rather than a
    magic number (100+ traces is a practical start). Attach expected outputs or reference
    answers written by domain experts; where a single gold string is impossible, store a
    rubric. Default to one principal domain-expert labeler, and when you need several,
    write annotation guidelines and measure inter-annotator agreement (Cohen's kappa).
    Fill coverage gaps with dimension-based synthetic data, but avoid it for high-stakes
    or niche cases. Version the set, prevent train/eval leakage, and keep updating it as
    new failure modes appear in production.
  key_points:
    - "Source examples from real production queries/logs/traces so the eval distribution matches real usage; sample typical AND problematic cases"
    - "Cover edge cases and known failure modes via error analysis (open/axial coding into a failure taxonomy); aim for coverage/saturation (~100+ traces)"
    - "Attach expected outputs / reference answers or pass-fail rubrics, authored by domain experts"
    - "Default to one domain-expert labeler; with multiple annotators, write guidelines and measure inter-annotator agreement (Cohen's kappa)"
    - "Use dimension-based synthetic data to fill gaps, but avoid it for high-stakes, niche, or underrepresented cases"
    - "Version the dataset, prevent train/eval leakage, and continually update it as new production failure modes surface"

hints:
  - "Where should the examples come from so they match what users actually do?"
  - "Think about who labels the expected outputs, and how you cover edge cases and failure modes."
  - "Real production traces + error analysis for coverage, expert-labeled expected outputs/rubrics, inter-annotator agreement, plus versioning and no train/eval leakage."

follow_ups:
  - "How large should the golden set be, and how do you know it's big enough and representative?"
  - "How do you prevent leakage between your eval set and your prompts or fine-tuning data — and detect it if it happened?"
  - "Two annotators disagree on many examples — how do you diagnose and fix it, and how would you quantify the problem?"

exercises:
  - kind: mcq
    stem: "What is the best primary source of examples for a golden eval dataset?"
    options:
      - { text: "Real production queries, logs, and traces (including problematic ones)", correct: true }
      - { text: "Only synthetic examples generated by the model itself" }
      - { text: "The model's public training benchmarks" }
      - { text: "A single hand-picked happy-path example" }
    explain: "Real production traffic matches the true input distribution; synthetic data supplements coverage but shouldn't be the sole source."

  - kind: mcq
    stem: "When multiple people label eval examples, what should you measure?"
    options:
      - { text: "Inter-annotator agreement (e.g. Cohen's kappa)", correct: true }
      - { text: "The average response latency" }
      - { text: "The model's token cost" }
      - { text: "BLEU score between labels" }
    explain: "Agreement metrics like Cohen's kappa reveal ambiguous items and unclear guidelines; low agreement means the labels aren't trustworthy yet."

  - kind: order
    prompt: "Order the steps to build a golden evaluation dataset"
    steps:
      - "Collect real production traces"
      - "Error-analyze traces into a failure taxonomy"
      - "Sample typical and problematic cases for coverage"
      - "Have domain experts attach expected outputs / rubrics"
      - "Version the set and guard against train/eval leakage"

  - kind: fill
    template: "Generating extra examples to fill coverage gaps is {0} data; keeping eval examples out of prompts and fine-tuning avoids {1}."
    blanks: ["synthetic", "leakage"]
    chips: ["synthetic", "leakage", "reference", "drift"]

  - kind: explain
