id: faq-assistant-what-youd-do-differently
category: project-deep-dive
skill: faq-assistant
type: rehearsal
your_project: faq-assistant
question: "If you started the FAQ Assistant over today, what would you do differently — and what would you explore next with more time?"
difficulty: medium
status: draft
source_refs: [exponent-openai, hello-interview]
sources:
  - title: "Exponent / OpenAI — What it's actually like to interview at OpenAI"
    url: "https://medium.com/exponent/what-its-actually-like-to-interview-at-openai-in-2026-03a646c9436c"
    supports: "what would you do differently if you started over; honest acknowledgement of gaps still gets you hired"
  - title: "Hello Interview — OpenAI L5 guide"
    url: "https://www.hellointerview.com/guides/openai/l5"
    supports: "what you'd explore next with more time; reasoning about different requirements"

probes:
  - "Which decision would you reverse, and what evidence changed your mind?"
  - "What was over-engineered, and what was under-built?"
  - "What technical debt did you knowingly take on, and why was it the right call then?"
  - "What would you explore next if you had another month?"
  - "How would your answer change at 10x the users or content?"

rubric:
  - "Names a specific change with clear reasoning, not vague 'more testing'"
  - "Shows honest self-assessment without self-flagellation — a mature retrospective"
  - "Distinguishes what was right-for-the-time from what was genuinely a mistake"
  - "Forward-looking: a concrete next exploration, not just regrets"
  - "Ties at least one change to an impact/metric it would move"

hints:
  - "Pick one thing you'd reverse and one thing you'd build next — be specific."
  - "Defend the original decision as reasonable given what you knew then."
  - "Connect the change to a number it would improve."

example_structure: |
  # Model STRUCTURE only — fill with your real reflection at runtime.
  1. What you'd change: the specific decision and the trigger for reversing it.
  2. Why the original call was still reasonable at the time.
  3. What you'd explore next with more time.
  4. The impact/metric each change targets.
