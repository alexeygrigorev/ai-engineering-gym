id: dataops-debugging-incident
category: project-deep-dive
skill: dataops
type: rehearsal
your_project: dataops
question: "Tell me about a data incident or pipeline failure on the DataOps project — how did you notice it, debug it, and fix it?"
difficulty: hard
status: draft
source_refs: [linkjob-anthropic, exponent-openai]
sources:
  - title: "LinkJob — Anthropic software engineer interview"
    url: "https://www.linkjob.ai/interview-questions/anthropic-software-engineer-interview/"
    supports: "how you debug production issues; data-quality handling and monitoring"
  - title: "Exponent / OpenAI — What it's actually like to interview at OpenAI"
    url: "https://medium.com/exponent/what-its-actually-like-to-interview-at-openai-in-2026-03a646c9436c"
    supports: "what went wrong, what was harder than expected, and how you went multiple levels deep to fix it"

probes:
  - "How did you first notice — an alert, a broken dashboard, or a consumer complaint?"
  - "Was it bad data, a schema change upstream, an orchestration failure, or infra?"
  - "How did you isolate the root cause across the pipeline stages?"
  - "How did you contain the blast radius and backfill/repair the data?"
  - "What did you add afterward so it wouldn't happen silently again?"

rubric:
  - "Concrete incident with a clear symptom, not a hypothetical"
  - "Shows a structured debugging path: observe -> hypothesize -> isolate -> confirm"
  - "Goes to real technical depth (which stage/source failed and why)"
  - "Addresses containment and data repair/backfill, not just the code fix"
  - "Closes the loop: added a check, alert, or contract so it recurs visibly, not silently"

hints:
  - "Anchor on the symptom — the wrong number a consumer saw or an alert that fired."
  - "Walk the stages: source -> ingest -> transform -> store; where did it break?"
  - "End with the data-quality check or alert you added, plus how you backfilled."

example_structure: |
  # Model STRUCTURE only — fill with your real incident at runtime.
  1. Symptom: what you (or a consumer/alert) observed.
  2. Investigation: hypotheses and how you narrowed it across stages.
  3. Root cause: the specific stage/source that failed.
  4. Containment + repair: how you stopped the bleeding and fixed the data.
  5. Prevention: the check/alert/contract you added.
