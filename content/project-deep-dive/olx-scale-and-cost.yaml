id: olx-scale-and-cost
category: project-deep-dive
skill: olx
type: rehearsal
your_project: olx
question: "How does the OLX project hold up under scale and cost constraints — what breaks first, and how would you handle 10x traffic or data?"
difficulty: hard
status: draft
source_refs: [hello-interview, exponent-openai]
sources:
  - title: "Hello Interview — OpenAI L5 guide"
    url: "https://www.hellointerview.com/guides/openai/l5"
    supports: "handling different scale constraints; reasoning about what changes at higher load"
  - title: "Exponent / OpenAI — What it's actually like to interview at OpenAI"
    url: "https://medium.com/exponent/what-its-actually-like-to-interview-at-openai-in-2026-03a646c9436c"
    supports: "impact/resource orientation — think about cost and business outcomes, not just elegance"

probes:
  - "What's the dominant cost driver — compute, storage, serving/inference, or infra?"
  - "What's the bottleneck at 10x — latency, cost, throughput, or a single component?"
  - "Which levers would you pull first: caching, batching, a cheaper model/path, sharding?"
  - "What's your rough cost per request/item, and how would you drive it down?"
  - "How does the system degrade gracefully under a traffic spike or dependency outage?"

rubric:
  - "Identifies the real bottleneck and cost driver for THIS system, with reasoning"
  - "Proposes concrete scaling/cost levers tied to their trade-offs"
  - "Cites or estimates numbers: QPS/volume, latency, cost per request"
  - "Shows impact/resource orientation — cost as a first-class concern"
  - "Covers graceful degradation and failure modes at scale, not just the happy path"

hints:
  - "Find the dominant cost driver first, then the first thing that saturates at 10x."
  - "For each lever, say what it costs you (e.g. cache staleness, batching latency)."
  - "Attach an estimate: cost per request or p95 latency."

example_structure: |
  # Model STRUCTURE only — fill with your real scale/cost analysis at runtime.
  1. Cost + load profile: dominant cost driver and current QPS/latency.
  2. First bottleneck at 10x and why.
  3. Levers in order, each with its trade-off.
  4. Graceful degradation under spike/outage.
