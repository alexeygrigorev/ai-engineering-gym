id: dataops-scale-and-cost
category: project-deep-dive
skill: dataops
type: rehearsal
your_project: dataops
question: "How does the DataOps pipeline hold up under scale and cost constraints — what breaks first, and how would you handle 10x the data volume?"
difficulty: hard
status: draft
source_refs: [hello-interview, exponent-openai]
sources:
  - title: "Hello Interview — OpenAI L5 guide"
    url: "https://www.hellointerview.com/guides/openai/l5"
    supports: "handling different scale constraints; reasoning about what changes at higher volume"
  - title: "Exponent / OpenAI — What it's actually like to interview at OpenAI"
    url: "https://medium.com/exponent/what-its-actually-like-to-interview-at-openai-in-2026-03a646c9436c"
    supports: "impact/resource orientation — think about cost and business outcomes, not just elegance"

probes:
  - "What's the dominant cost driver — compute, storage, data transfer, or a managed service?"
  - "What breaks first at 10x volume — throughput, the SLA window, cost, or a single node?"
  - "Which levers would you pull: partitioning, incremental processing, compression, cheaper storage tiers?"
  - "What's your rough cost per run / per TB, and how would you drive it down?"
  - "How does the pipeline degrade gracefully under a data spike or upstream slowdown?"

rubric:
  - "Identifies the real bottleneck and cost driver for THIS pipeline, with reasoning"
  - "Proposes concrete scaling/cost levers (partitioning, incremental, tiered storage) with trade-offs"
  - "Cites or estimates numbers: volume, SLA window, cost per run/TB"
  - "Shows impact/resource orientation — cost as a first-class concern"
  - "Covers graceful degradation and failure modes at scale, not just the happy path"

hints:
  - "Find the dominant cost driver first — usually compute or storage."
  - "For each lever, say what it costs you (e.g. incremental adds complexity/state)."
  - "Attach an estimate: cost per run, throughput, or SLA headroom."

example_structure: |
  # Model STRUCTURE only — fill with your real scale/cost analysis at runtime.
  1. Cost + volume profile: dominant cost driver and current throughput/SLA.
  2. First thing that breaks at 10x and why.
  3. Levers in order, each with its trade-off.
  4. Graceful degradation under a spike or upstream slowdown.
