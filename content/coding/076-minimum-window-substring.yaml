id: leetcode-076-minimum-window-substring
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "76. Minimum Window Substring"
description: |
  Given two strings `s` and `t`, return the shortest substring of `s` that contains every
  character of `t` including duplicates (counting multiplicity). If no such window exists,
  return the empty string `""`. The answer is guaranteed unique when it exists. Example:
  `s = "ADOBECODEBANC"`, `t = "ABC"` -> `"BANC"`.
difficulty: hard
tags: [dsa]
ai_relevant: false
hints:
  - "A sliding window paired with a frequency count of the target characters tells you how much of the target is still missing."
  - "Expand the window's right edge until it covers every needed character, then shrink from the left while it stays valid."
  - "One pass with two pointers and running counts achieves O(n + m) time."
status: draft
answer:
  approach: >
    Sliding window with character counts. Count how many of each character t requires and
    track total_count, the number of still-needed characters. Expand the right edge over s,
    decrementing counts and total_count whenever the added character was actually needed.
    Whenever total_count hits 0 the window covers t, so try to shrink from the left. Record
    the window if it's the smallest so far, then remove the left character (bumping its count
    and total_count back if it was required) and advance left. Continue until the right edge
    reaches the end. Return the smallest recorded window.
  pseudocode: |
    need = count of each char in t
    total = len(t)
    left = 0; best = none
    for right in 0..len(s)-1:
        if need[s[right]] > 0: total--
        need[s[right]]--
        while total == 0:                 # window valid, shrink
            update best with [left, right]
            need[s[left]]++
            if need[s[left]] > 0: total++
            left++
    return best window or ""
  complexity: { time: "O(n + m)", space: "O(alphabet)" }
