question: "51. N-Queens"
difficulty: hard
tags: [dsa]
ai_relevant: false
hints:
  - "Since exactly one queen goes in each row, think of placing queens row by row and tracking which columns and diagonals are already under attack."
  - "Backtrack: at each row try every free column, mark the cells that queen attacks (its column and both diagonals), and recurse into the next row before undoing the choice."
  - "Reaching row n with a valid placement means a full board is found; this exponential backtracking is bounded by the number of ways to place n non-attacking queens."
status: draft
answer:
  approach: >
    Backtracking row by row. Since each row holds exactly one queen, place a queen in
    some free column of the current row, mark all cells it attacks (its column, and both
    diagonals) as taken, and recurse to the next row on a copy of that attack mask. When
    every free column in a row has been tried, backtrack. Reaching row n means all queens
    are placed — reconstruct the board from the mask and record it as a solution.
  pseudocode: |
    solve(row, mask, solutions):
        if row == n:
            solutions.add(board from mask); return
        for c in 0..n-1:
            if mask[row][c] is empty:
                copy = mask with queen at (row,c) and its attacks marked
                solve(row+1, copy, solutions)
  complexity: { time: "exponential (bounded by n! placements)", space: "O(n^2) per board mask plus recursion" }
