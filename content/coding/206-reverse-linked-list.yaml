id: leetcode-206-reverse-linked-list
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "206. Reverse Linked List"
description: |
  Given the `head` of a singly linked list, reverse the list and return the new
  head. Example: `1 -> 2 -> 3 -> 4 -> 5` becomes `5 -> 4 -> 3 -> 2 -> 1`.
difficulty: easy
tags: [dsa]
ai_relevant: true
hints:
  - "Reversing means flipping each node's next pointer to point backward instead of forward."
  - "Traverse the list with a prev pointer, saving each node's next before overwriting node.next to point at prev."
  - "One pass with O(n) time and O(1) space. prev becomes the new head once the cursor runs off the end."
status: draft
answer:
  approach: >
    Reverse the pointers in a single pass, traversing the list with a prev
    pointer. For each node, save its next, point the node back to prev, then
    advance prev and the cursor. When the cursor runs off the end, prev is the
    new head.
  pseudocode: |
    prev = null; node = head
    while node:
        next = node.next
        node.next = prev
        prev = node
        node = next
    return prev
  complexity: { time: "O(n)", space: "O(1)" }
