question: "206. Reverse Linked List"
difficulty: easy
status: draft
answer:
  approach: >
    Reverse the pointers in a single pass. Walk the list keeping a prev pointer;
    for each node, save its next, point the node back to prev, then advance prev
    and the cursor. When the cursor runs off the end, prev is the new head.
  pseudocode: |
    prev = null; node = head
    while node:
        next = node.next
        node.next = prev
        prev = node
        node = next
    return prev
  complexity: { time: "O(n)", space: "O(1)" }
