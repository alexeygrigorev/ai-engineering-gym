question: "239. Sliding Window Maximum"
difficulty: hard
status: draft
answer:
  approach: >
    Report the maximum of each size-k window. This solution keeps the window in
    an ordered multiset (a balanced tree of value -> count): sliding one step
    removes the outgoing element and inserts the incoming one, and the current
    maximum is the largest key, so each step is O(log k). The optimal O(n)
    method keeps a monotonic decreasing deque of indices.
  pseudocode: |
    window = ordered multiset
    insert the first k elements; record the largest key
    for i = k..n-1:
        remove nums[i-k]; insert nums[i]
        record the largest key as this window's maximum
  complexity: { time: "O(n log k)", space: "O(k)" }
follow_ups:
  - "Achieve O(n) with a monotonic decreasing deque of indices."
  - "Also maintain the sliding-window minimum simultaneously."
  - "How does the deque discard elements that can never be the max?"
