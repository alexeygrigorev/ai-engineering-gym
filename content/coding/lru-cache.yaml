id: lru-cache
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "LRU Cache with O(1) get and put."
problem: >
  Design a data structure for a Least Recently Used (LRU) cache with a fixed
  capacity. Support get(key) — return the value if present, else -1 — and
  put(key, value) — insert or update. Both operations must run in O(1) average
  time. When capacity is exceeded, evict the least recently used entry. Both get
  and put count as "using" a key.
difficulty: medium
status: draft
source_refs: [devto-xai]
sources:
  - title: "LeetCode 146 — LRU Cache Solution & Explanation (NeetCode)"
    url: "https://neetcode.io/solutions/lru-cache"
    supports: "hash map + doubly linked list with sentinel nodes; O(1) get/put"
  - title: "LeetCode — 146. LRU Cache (problem statement)"
    url: "https://leetcode.com/problems/lru-cache/"
    supports: "problem definition and O(1) average time requirement"
  - title: "algo.monster — 146. LRU Cache In-Depth Explanation"
    url: "https://algo.monster/liteproblems/146"
    supports: "why a doubly linked list (not singly) enables O(1) node removal"

answer:
  approach: >
    Combine a hash map with a doubly linked list. The hash map maps key -> node,
    giving O(1) lookup of any entry. The doubly linked list stores nodes in
    recency order: most-recently-used near the head, least-recently-used near the
    tail. A doubly linked list (not singly) is required so any node can be unlinked
    in O(1) — you have direct pointers to its neighbors. On every get and put, move
    the touched node to the head to mark it most-recently used. On put past
    capacity, evict the tail node (LRU) and delete its key from the map. Use dummy
    head and tail sentinel nodes so insertion and removal never need null checks.
  pseudocode: |
    class Node: key, val, prev, next
    map: key -> Node
    head, tail = sentinel dummies; head.next = tail; tail.prev = head

    remove(node):        # unlink from list, O(1)
      node.prev.next = node.next
      node.next.prev = node.prev

    add_front(node):     # insert right after head (most recent)
      node.next = head.next; node.prev = head
      head.next.prev = node; head.next = node

    get(k):
      if k not in map: return -1
      node = map[k]
      remove(node); add_front(node)   # mark most-recently used
      return node.val

    put(k, v):
      if k in map:
        node = map[k]; node.val = v
        remove(node); add_front(node)
      else:
        if len(map) == capacity:
          lru = tail.prev
          remove(lru); del map[lru.key]   # evict least recently used
        node = Node(k, v)
        map[k] = node; add_front(node)
  complexity:
    time: "O(1) average per get and put (hash map lookup + constant linked-list pointer updates)"
    space: "O(capacity) for the map plus one node per stored entry"

