question: "1. Two Sum"
difficulty: easy
tags: [dsa]
ai_relevant: true
hints:
  - "A hash map lets you check for a needed value in O(1) as you scan."
  - "For each element a, look for its complement target - a among values seen so far."
  - "One linear pass storing value->index gets you O(n) time, O(n) space."
status: draft
answer:
  approach: >
    Scan the array once, keeping a hash map from value seen so far to its index.
    For each element a, the complement we need is b = target - a. If b is already
    in the map, we've found the pair and return the two indices. Otherwise store a
    with its index and continue. This trades O(n) extra space for a single linear
    pass instead of the O(n^2) brute-force double loop.
  pseudocode: |
    index = {}                      # value -> position
    for i, a in enumerate(nums):
        b = target - a
        if b in index:
            return [index[b], i]
        index[a] = i
  complexity: { time: "O(n)", space: "O(n)" }
