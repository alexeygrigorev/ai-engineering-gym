id: leetcode-010-regular-expression-matching
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "10. Regular Expression Matching"
difficulty: hard
tags: [dsa]
ai_relevant: false
hints:
  - "Solve match(s, p) recursively, treating '.' as any single character and '*' as zero-or-more copies of the element before it."
  - "When the regex's second character is '*', branch into two cases: skip the starred element entirely (zero occurrences), or consume one matching character from s and retry with the same regex (one-or-more)."
  - "Plain recursion is exponential in the worst case. Memoizing on the (s, p) positions brings it down to an O(n*m) DP."
status: draft
answer:
  approach: >
    Solve it with recursion on match(s, p), where '.' matches any single character and
    '*' matches zero or more of the preceding element. If both s and p are empty,
    return true. If s is empty but p isn't, it only matches when the next regex
    element is starred (skip it: match("", p[2:])). When the second regex char is
    '*' the current element is optional, so handle the '.' case and the specific-char
    case: consume as many matching characters from s as possible and try continuing
    with p[2:], and also try the zero-match branch. Otherwise, if the first characters
    match ('.' or equal), recurse on match(s[1:], p[1:]). Otherwise return false.
  pseudocode: |
    match(s, p):
        if p empty:                return s empty
        if s empty:
            return len(p) >= 2 and p[1]=='*' and match(s, p[2:])
        starred = len(p) > 1 and p[1] == '*'
        if starred:
            # zero occurrences
            if match(s, p[2:]): return true
            # one-or-more: first char must match
            if p[0]=='.' or p[0]==s[0]:
                return match(s[1:], p)
            return false
        if p[0]=='.' or p[0]==s[0]:
            return match(s[1:], p[1:])
        return false
  complexity: { time: "exponential without memoization (O(n*m) with a DP table)", space: "O(n + m) recursion (O(n*m) memoized)" }
