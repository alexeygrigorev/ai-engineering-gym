id: leetcode-083-remove-duplicates-sorted-list
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "83. Remove Duplicates from Sorted List"
difficulty: easy
tags: [dsa]
ai_relevant: false
hints:
  - "In a sorted list, equal values sit right next to each other, so duplicates can be spotted locally."
  - "Keep a pointer at the last kept node and unlink any following node whose value matches it."
  - "One linear, in-place pass gives O(n) time and O(1) space."
status: draft
answer:
  approach: >
    The list is sorted, so equal values are adjacent. Keep the first occurrence of each
    value and drop the rest. Walk with a prev pointer at the last kept node. If the current
    node equals prev's value, unlink it (prev.next = node.next). Otherwise advance prev to
    the current node. One linear pass, in place.
  pseudocode: |
    prev = head
    node = head.next
    while node:
        if node.val == prev.val:
            prev.next = node.next        # skip duplicate
        else:
            prev = node
        node = node.next
    return head
  complexity: { time: "O(n)", space: "O(1)" }
