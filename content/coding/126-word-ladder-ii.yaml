id: leetcode-126-word-ladder-ii
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "126. Word Ladder II"
difficulty: hard
status: draft
answer:
  approach: >
    Return every shortest transformation sequence. Bucket words by wildcard
    patterns - replace each position with '_' - so words that differ by one
    letter share a bucket; this builds an implicit graph of single-letter-change
    neighbors. Run BFS from beginWord recording, for each word, all predecessors
    that first reach it at the shortest distance. Then DFS backward from endWord
    through those predecessor links to reconstruct all shortest paths.
  pseudocode: |
    build groups: for each word and each position -> pattern -> list of words
    graph[w] = all words sharing any wildcard pattern with w
    BFS from begin:
        dist[begin] = 0
        for neighbor 'to' of 'from':
            if unseen: dist[to] = dist[from]+1; parents[to] = [from]; enqueue
            elif dist[to] == dist[from]+1: parents[to].append(from)
    DFS from end back through parents, collecting reversed shortest paths
  complexity: { time: "O(N * L^2) to build the graph, plus path enumeration", space: "O(N * L)" }
follow_ups:
  - "Why record all parents at the BFS frontier instead of just one?"
  - "How do you avoid revisiting nodes yet still capture multiple shortest parents?"
  - "Can the number of shortest paths be exponential in the input?"
