id: aieng-credits-expiry-system
category: coding
skill: implementation
type: coding
subtype: implementation
question: >
  Build a credits management system (reported at OpenAI). Customers are granted credits
  that expire at a given time. Level 1: add credits (amount, expiry) and charge a cost,
  spending soonest-to-expire first. Level 2: expire credits automatically once their
  time passes. Level 3: handle events arriving out of order (a charge can arrive before
  the grant that funds it). Design so each level builds on the last.
difficulty: hard
status: draft
ai_relevant: true
source_refs: [exponent-openai]
answer:
  design_approach: >
    OpenAI's progressive coding format: four gates of rising difficulty, pass by clearing
    two. It's really an event-simulation / bookkeeping problem, so the win is a data model
    that survives the out-of-order twist at the end. Represent each grant as a lot:
    {amount_remaining, expires_at, granted_at}. A charge consumes from lots in
    expiry order (soonest-expiring first) so credits aren't wasted — a priority queue /
    heap keyed by expiry is the natural structure. Clarify the rules before coding: does
    an unfunded charge fail, go negative, or wait for a future grant? What breaks ties?
    The hard version says events can arrive out of order (unstable network), which means
    you cannot decide a charge's outcome purely on arrival — you must reason by event
    timestamp, not arrival order. Design Level 1 around timestamps from the start and the
    out-of-order case becomes a re-processing problem, not a rewrite.
  extension_points:
    - level: "L1 — add credits + charge (spend soonest-expiring first)"
      approach: >
        Keep active lots in a min-heap keyed by expires_at. add(t, amount, expires_at)
        pushes a lot. charge(t, cost) pops the soonest-to-expire lot, deducts from it,
        and continues to the next lot until the cost is covered; partially-consumed lots
        stay on the heap. Spending soonest-expiring-first maximizes credits actually used
        before they lapse.
    - level: "L2 — automatic expiry"
      approach: >
        Before servicing any charge at time t, drain the heap of lots whose
        expires_at <= t (they're dead and can't fund anything). This is lazy expiry
        driven by the current event's timestamp — no background timer needed since the
        system is event-driven. Report the current balance as the sum of remaining amounts
        over unexpired lots.
    - level: "L3 — out-of-order events"
      approach: >
        Events carry timestamps but may arrive in any order, so a charge can land before
        the grant that funds it. Two robust strategies. (a) Buffer and replay: collect
        events, sort by timestamp, then process the ordered stream through the L1/L2 logic
        — clean and correct if you can batch. (b) Streaming with reconciliation: keep an
        event log; when a late grant arrives with an earlier timestamp, re-derive state
        from the affected timestamp forward (or maintain per-timestamp deltas). Either way,
        the invariant is that final state depends only on event timestamps, never on
        arrival order — state that Level 1's timestamped model already makes possible.
  complexity:
    time: "O(log n) per add and per lot consumed via the heap; O(n log n) to sort for a replay pass"
    space: "O(n) for the active lots / event log"
hints:
  - "Model each grant as a lot {amount_remaining, expires_at}. A charge spends soonest-to-expire first — a min-heap keyed by expiry gives you that ordering."
  - "Do expiry lazily and driven by the event timestamp: before each charge at time t, drop lots with expires_at <= t. No background timer in an event-driven system."
  - "For out-of-order events, make final state a function of timestamps only. Buffer-and-sort-then-replay is the clean version; a re-derive-from-affected-timestamp log is the streaming version."
follow_ups:
  - "Why is spending soonest-to-expire first the right greedy choice?"
  - "How do you handle a charge that arrives before any funding grant — fail, defer, or go negative?"
  - "Buffer-and-replay vs. incremental reconciliation — when do you pick each?"
  - "How would you answer 'what was the balance at time t' for an arbitrary past t?"
  - "How would you make this idempotent against duplicate/retried events?"
