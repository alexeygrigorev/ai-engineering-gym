hints:
  - "Each node belongs to a specific depth, so group node values by their level."
  - "Traverse the tree while tracking the current depth, appending each node's value into that level's bucket."
  - "One O(n) traversal, starting a new bucket the first time a depth is reached, produces the level-order lists."
status: draft
answer:
  approach: >
    Group node values by depth. Do a DFS tracking the current level. The first
    time a level is seen, start a new bucket, then append each node's value to
    its level's bucket. Visiting the left child before the right keeps
    left-to-right order within each level. A BFS that processes the queue one
    level at a time is the equivalent iterative approach.
  pseudocode: |
    result = []
    dfs(node, level):
        if node is null: return
        if level == len(result): result.append([])
        dfs(node.left, level+1)
        result[level].append(node.val)
        dfs(node.right, level+1)
    dfs(root, 0)
    return result
  complexity: { time: "O(n)", space: "O(n)" }
