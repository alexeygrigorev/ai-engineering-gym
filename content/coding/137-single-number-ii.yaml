question: "137. Single Number II"
difficulty: medium
status: draft
answer:
  approach: >
    Every element appears three times except one. Count occurrences in a hash
    map, deleting a key as soon as its count reaches three; the single key left
    is the answer. The O(1)-space trick instead sums each bit position modulo 3
    across all numbers.
  pseudocode: |
    count = {}
    for x in nums:
        count[x] += 1
        if count[x] == 3: delete count[x]
    return the only remaining key
  complexity: { time: "O(n)", space: "O(n)" }
