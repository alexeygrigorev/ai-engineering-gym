question: "141. Linked List Cycle"
difficulty: easy
tags: [dsa]
ai_relevant: true
hints:
  - "Use two pointers that move through the list at different speeds."
  - "Advance a slow pointer one step and a fast pointer two steps each iteration. A cycle forces them to eventually collide."
  - "This runs in O(n) time and O(1) space with no extra data structure needed."
status: draft
answer:
  approach: >
    Floyd's tortoise-and-hare advances a slow pointer one step and a fast
    pointer two steps at a time. If a cycle exists the fast pointer laps around
    and meets the slow one, otherwise fast reaches the end (null). It uses
    constant extra space.
  pseudocode: |
    slow = head; fast = head
    while fast and fast.next:
        slow = slow.next
        fast = fast.next.next
        if slow == fast: return true
    return false
  complexity: { time: "O(n)", space: "O(1)" }
