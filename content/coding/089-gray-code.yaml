id: leetcode-089-gray-code
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "89. Gray Code"
difficulty: medium
status: draft
answer:
  approach: >
    Build the sequence iteratively by reflection. Start with [0]. For each bit i
    from 0 to n-1, take the current list and, walking it in reverse order, set
    bit i on each existing code and append the result. Reflecting the list and
    prefixing the new high bit guarantees consecutive codes differ by exactly
    one bit, and the list doubles each round until it holds all 2^n codes.
  pseudocode: |
    result = [0]
    for i in 0..n-1:
        for k from len(result)-1 down to 0:
            result.append(result[k] | (1 << i))
    return result
  complexity: { time: "O(2^n)", space: "O(2^n)" }
