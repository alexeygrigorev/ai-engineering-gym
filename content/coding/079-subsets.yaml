id: leetcode-079-subsets
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "78. Subsets"
description: |
  Given an integer array `nums` of unique elements, return all possible subsets (the power
  set). The result must not contain duplicate subsets and may be returned in any order.
  Example: `nums = [1,2,3]` -> `[[],[1],[2],[3],[1,2],[1,3],[2,3],[1,2,3]]`.
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Each subset corresponds to a unique choice of include or exclude for every element."
  - "Represent that choice as an n-bit number and enumerate every value from 0 to 2^n - 1."
  - "For each mask, build the subset from the set bits, giving an O(n * 2^n) solution."
status: draft
answer:
  approach: >
    There are 2^n subsets of n elements, and each corresponds to an n-bit mask where bit j
    says whether nums[j] is included. So enumerate all masks 0 .. 2^n - 1 and, for each,
    collect the elements whose bit is set. (An equivalent formulation is recursive
    include/exclude backtracking. Another starts with the empty set and, for each new
    element, appends copies of all existing subsets extended by it.)
  pseudocode: |
    result = []
    for mask in 0 .. 2^n - 1:
        subset = [nums[j] for j in 0..n-1 if mask has bit j set]
        result.append(subset)
    return result
  complexity: { time: "O(n * 2^n)", space: "O(n * 2^n) for the output" }
