id: leetcode-069-sqrtx
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "69. Sqrt(x)"
description: |
  Given a non-negative integer `x`, return the integer square root of `x`, i.e. `sqrt(x)`
  rounded down to the nearest integer. Do not use any built-in exponent/sqrt function.
  Example: `x = 8` -> `2` (since `2.828...` truncates to `2`); `x = 4` -> `2`.
difficulty: easy
tags: [dsa]
ai_relevant: false
hints:
  - "The function g -> g*g is monotonic over non-negative g, which means you can bracket the true root instead of testing every candidate."
  - "Binary search over the range from 1 to x, narrowing the bounds based on whether the midpoint squared is smaller or larger than x."
  - "Stop once the guess is close enough and take the floor of it, giving O(log x) time and O(1) space."
status: draft
answer:
  approach: >
    Binary search for the square root. The root of x lies in [1, x]. Repeatedly take the
    midpoint g and compare g*g against x, moving the low bound up when g*g is too small and
    the high bound down when it's too big, until the guess is close enough. Since the
    problem wants the integer part, round the converged guess down (with a small epsilon to
    decide whether to round the boundary case). Bracketing on a monotonic function is the
    core idea. (0 and 1 are returned directly.)
  pseudocode: |
    if x <= 1: return x
    lo = 1; hi = x
    loop:
        g = (lo + hi) / 2
        if |g*g - x| small enough: break
        if g*g < x: lo = g else hi = g
    return floor(g)     # integer part
  complexity: { time: "O(log x)", space: "O(1)" }
