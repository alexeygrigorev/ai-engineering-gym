id: leetcode-033-search-in-rotated-sorted-array
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "33. Search in Rotated Sorted Array"
description: |
  An ascending sorted array of distinct integers has been rotated at some unknown
  pivot (e.g. `[0,1,2,4,5,6,7]` might become `[4,5,6,7,0,1,2]`). Given the rotated
  array `nums` and a `target`, return the index of `target`, or `-1` if it is absent.
  Aim for `O(log n)` time. Example: `nums = [4,5,6,7,0,1,2]`, `target = 0` -> `4`.
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Even after rotation, at least one half of any subarray you look at is still sorted."
  - "At each step figure out which half (left or right of the midpoint) is sorted. Then check whether the target falls inside that sorted half to decide which side to search."
  - "A modified binary search that discards half the range each step gives O(log n) time."
status: draft
answer:
  approach: >
    The array was sorted and then rotated by an unknown amount. There's one "pivot"
    where the order breaks, and no duplicates. Do a modified binary search on
    [l, r]. Take the middle m and look at A[l], A[m], A[r]. If the target equals any of
    these, return that index. If start <= target < mid, the left half is sorted and the
    target must be there, so recurse left. If mid < target <= end, the right half is
    sorted and holds the target, so recurse right. If neither ordinary case fires, the
    order breaks in this window, so find which side the pivot is on. If mid > right the
    pivot is on the right, so go right. If mid < left the pivot is on the left, so go
    left. (Duplicates need the extra handling in problem 81.)
  pseudocode: |
    search(A, t, l, r):
        if l > r: return -1
        m = l + (r - l) / 2
        if A[m] == t: return m
        if A[l] <= t and t < A[m]: return search(A, t, l, m-1)   # left sorted
        if A[m] < t and t <= A[r]: return search(A, t, m+1, r)   # right sorted
        if A[m] > A[r]:            return search(A, t, m+1, r)   # pivot on right
        if A[m] < A[l]:            return search(A, t, l, m-1)   # pivot on left
        return -1
  complexity: { time: "O(log n)", space: "O(log n) recursion" }
