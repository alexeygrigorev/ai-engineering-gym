id: leetcode-005-longest-palindromic-substring
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "5. Longest Palindromic Substring"
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Think in terms of a 2D table where entry (i, j) records whether the substring from i to j is a palindrome."
  - "A substring is a palindrome exactly when its two ends match and the substring strictly inside them is also a palindrome. This recurrence can be filled bottom-up by increasing length."
  - "Filling the whole table and tracking the longest span that comes out true costs O(n^2) time and space."
status: draft
answer:
  approach: >
    Fill a boolean DP table palindromes[i][j] marking whether s[i..j] is a palindrome.
    s[i..j] is a palindrome when s[i] == s[j] and the inside s[i+1..j-1]
    is also a palindrome. So palindromes[i][j] = true if s[i] == s[j] and
    palindromes[i+1][j-1] is true (with length 1 and 2 as base cases). Fill the table
    and keep track of the longest span that comes out true.
  pseudocode: |
    n = len(s)
    palindromes = n x n table of false
    best = s[0:1]
    for i in 0..n-1:
        palindromes[i][i] = true
        for j from i-1 down to 0:
            length = i - j + 1
            ok = (s[i] == s[j])
            if length > 2:
                ok = ok and palindromes[i-1][j+1]
            palindromes[i][j] = ok
            if ok and length > len(best):
                best = s[j..i]
    return best
  complexity: { time: "O(n^2)", space: "O(n^2)" }
