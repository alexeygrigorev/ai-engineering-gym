question: "42. Trapping Rain Water"
difficulty: hard
tags: [dsa]
ai_relevant: false
hints:
  - "The water trapped above any bar depends only on the tallest bar to its left and the tallest bar to its right."
  - "Sweep inward from both ends toward the position of the global maximum, tracking a running left_max and right_max as you go."
  - "This two-pointer sweep computes the total trapped water in a single O(n) time, O(1) space pass."
status: draft
answer:
  approach: >
    Water above a bar is bounded by the tallest bar to its left and the tallest to its
    right. The trapped amount at that bar is min(left_max, right_max) - height. Sweep
    from both ends toward the global maximum: from the left, track the running left_max
    and add left_max - height wherever the current bar is lower. Do the same symmetrically
    from the right with right_max. The two sweeps meet at the tallest bar, which correctly
    bounds both sides. Every position is counted once in a single O(n) pass with O(1) space.
  pseudocode: |
    m = index/height of global max
    left_max = h[0]
    for left from 0 while h[left] < m:
        if h[left] <= left_max: water += left_max - h[left]
        else:                   left_max = h[left]
    right_max = h[last]
    for right from last while h[right] < m:
        if h[right] <= right_max: water += right_max - h[right]
        else:                     right_max = h[right]
    return water
  complexity: { time: "O(n)", space: "O(1)" }
