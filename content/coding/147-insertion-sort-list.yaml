id: leetcode-147-insertion-sort-list
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "147. Insertion Sort List"
description: |
  Given the `head` of a singly linked list, sort it in ascending order and return the
  new head. Example: `[4,2,1,3]` -> `[1,2,3,4]`.
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Build the sorted result incrementally, keeping in mind a linked list can't be indexed like an array."
  - "Repeatedly scan the unsorted remainder for the current minimum, unlink it, and attach it to the front of the growing sorted portion."
  - "This selection-sort-over-a-list approach runs in O(n^2) time and O(1) extra space."
status: draft
answer:
  approach: >
    Sort a linked list by repeatedly selecting the minimum. Scan the unsorted
    remainder to find the minimum node, unlink it, and place it at the front of
    the growing sorted result. That's a selection sort over the list. Classic
    insertion sort instead walks the sorted prefix to find each node's insertion
    point.
  pseudocode: |
    sorted = empty
    while list not empty:
        find node with the minimum value (track its predecessor)
        unlink it from the list
        attach it into the sorted portion in order
    return sorted
  complexity: { time: "O(n^2)", space: "O(1)" }
