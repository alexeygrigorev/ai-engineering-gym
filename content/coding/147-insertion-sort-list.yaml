question: "147. Insertion Sort List"
difficulty: medium
status: draft
answer:
  approach: >
    Sort a linked list by repeatedly selecting the minimum. Scan the unsorted
    remainder to find the minimum node, unlink it, and place it at the front of
    the growing sorted result - a selection sort over the list. Classic
    insertion sort instead walks the sorted prefix to find each node's insertion
    point.
  pseudocode: |
    sorted = empty
    while list not empty:
        find node with the minimum value (track its predecessor)
        unlink it from the list
        attach it into the sorted portion in order
    return sorted
  complexity: { time: "O(n^2)", space: "O(1)" }
