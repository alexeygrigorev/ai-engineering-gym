id: leetcode-004-median-of-two-sorted-arrays
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "4. Median of Two Sorted Arrays"
difficulty: hard
tags: [dsa]
ai_relevant: false
hints:
  - "The median is the k-th smallest element across both arrays (or the average of two such elements). Reframe the task as finding the k-th smallest."
  - "Compare the m-th elements of each array, where m = k/2, to see which array's prefix can never contain the answer and discard it, shrinking k."
  - "Discarding roughly half of the remaining elements at each step gives O(log(n+m)) instead of merging in O(n+m)."
status: draft
answer:
  approach: >
    Treat the median as the k-th smallest element of the combined arrays (or the
    average of the two middle ones for even total length). Reduce the problem to "find
    the k-th smallest across two sorted arrays" and solve that with binary search
    instead of merging. Compare the m-th elements of each array where m = k/2.
    Whichever side is smaller can't contain the k-th element in its first m entries,
    so discard that prefix and shrink k accordingly. Recurse until k reaches 1 or one
    array is empty.
    This gets to O(log(n+m)) rather than the O(n+m) merge.
  pseudocode: |
    kth(a, b, k):
        if a is empty: return b[k-1]
        if b is empty: return a[k-1]
        if k == 1:     return min(a[0], b[0])
        m  = k / 2
        ia = min(len(a), m); ib = min(len(b), m)
        if a[ia-1] < b[ib-1]:
            return kth(a[ia:], b, k - ia)   # drop a's prefix
        else:
            return kth(a, b[ib:], k - ib)   # drop b's prefix

    findMedian(a, b):
        total = len(a) + len(b)
        if total is odd:  return kth(a, b, total/2 + 1)
        else:             return (kth(a, b, total/2) + kth(a, b, total/2 + 1)) / 2
  complexity: { time: "O(log(n + m))", space: "O(log(n + m)) recursion" }
