id: leetcode-025-reverse-nodes-in-k-group
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "25. Reverse Nodes in k-Group"
difficulty: hard
tags: [dsa]
ai_relevant: false
hints:
  - "Process the list one group of k nodes at a time rather than reversing the whole list in one go."
  - "For each group, first confirm k nodes actually remain, then reverse just those k nodes in place and reconnect the previous group's tail to the new group's head."
  - "Remember the node right after the group before reversing so you can continue correctly, and use a dummy head to simplify stitching the first group; this runs in O(n) time and O(1) space."
status: draft
answer:
  approach: >
    Walk the list group by group. For each group of k nodes, first check there are k
    nodes left by advancing to the group end; if fewer than k remain, leave that tail
    as-is and stop. Otherwise remember the node after the group, reverse the k nodes in
    place, and wire the previous group's tail to the new head (the old group end) while
    the old group start becomes the new tail. Continue from the saved next node. A dummy
    head simplifies stitching the first group.
  pseudocode: |
    dummy -> head; prev = dummy
    group_start = head
    while group_start:
        group_end = advance k-1 from group_start (null if < k remain)
        if group_end is null:
            prev.next = group_start; break
        next = group_end.next
        reverse nodes from group_start to group_end
        prev.next = group_end        # reversed head
        prev = group_start           # reversed tail
        group_start = next
    return dummy.next
  complexity: { time: "O(n)", space: "O(1)" }
