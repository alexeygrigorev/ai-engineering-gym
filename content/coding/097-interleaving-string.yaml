id: leetcode-097-interleaving-string
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "97. Interleaving String"
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Track how many characters have been consumed from each of the two source strings as you match against the target."
  - "At each pair of consumption counts, the next target character can only come from one of the two strings. Build a table of reachable states."
  - "A 2D table over prefixes of the two source strings solves it in O(n*m) time."
status: draft
answer:
  approach: >
    Decide whether s3 is formed by interleaving s1 and s2 while preserving each
    string's order. Match from the front: the next character of s3 must come
    from s1 or s2, so recurse on both options. Memoize on the pair (i, j) of
    positions consumed in s1 and s2 so each state is solved once. The equivalent
    bottom-up form fills a DP table where dp[i][j] is true when s1[:i] and s2[:j]
    interleave to form s3[:i+j]. Each cell is reachable either from above
    (consume an s1 char) or from the left (consume an s2 char).
  pseudocode: |
    if len(s1) + len(s2) != len(s3): return false
    dp[0][0] = true
    for i in 1..len(s1): dp[i][0] = dp[i-1][0] and s1[i-1] == s3[i-1]
    for j in 1..len(s2): dp[0][j] = dp[0][j-1] and s2[j-1] == s3[j-1]
    for i in 1..len(s1):
        for j in 1..len(s2):
            dp[i][j] = (dp[i-1][j] and s1[i-1] == s3[i+j-1])
                    or (dp[i][j-1] and s2[j-1] == s3[i+j-1])
    return dp[len(s1)][len(s2)]
  complexity: { time: "O(n*m)", space: "O(n*m)" }
follow_ups:
