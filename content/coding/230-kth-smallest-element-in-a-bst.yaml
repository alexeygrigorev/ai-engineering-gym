id: leetcode-230-kth-smallest-element-in-a-bst
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "230. Kth Smallest Element in a BST"
description: |
  Given the `root` of a binary search tree and an integer `k` (1-indexed), return
  the value of the `k`-th smallest element among all node values. Example: for a
  BST containing `1, 2, 3, 4` with `k = 1` -> `1`.
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "In-order traversal of a BST visits nodes in ascending sorted order."
  - "Walk the tree in-order while keeping a counter, and stop as soon as the counter reaches k."
  - "This reaches O(h + k) time using O(h) space, with no need to build the full sorted list."
status: draft
answer:
  approach: >
    An in-order traversal of a BST visits values in ascending order, so the k-th
    node visited is the k-th smallest. Traverse in-order with a counter and stop
    as soon as the counter reaches k, returning that node's value without
    visiting the rest of the tree.
  pseudocode: |
    count = 0; answer = null
    inorder(node):
        if node is null or answer is found: return
        inorder(node.left)
        count += 1
        if count == k: answer = node.val; return
        inorder(node.right)
    inorder(root)
    return answer
  complexity: { time: "O(h + k)", space: "O(h)" }
follow_ups:
