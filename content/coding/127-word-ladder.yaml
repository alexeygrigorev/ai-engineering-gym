question: "127. Word Ladder"
difficulty: hard
status: draft
answer:
  approach: >
    Shortest transformation length only. Build the same wildcard-pattern graph,
    where words that differ by one letter share a bucket. Then run bidirectional
    BFS from both beginWord and endWord, expanding the two frontiers
    alternately; when they meet, the shortest ladder length is the sum of the
    two distances. Searching from both ends keeps each frontier small and cuts
    the explored space dramatically versus one-directional BFS.
  pseudocode: |
    build wildcard groups -> graph of neighbors
    frontier1 from begin (dist1), frontier2 from end (dist2)
    while both frontiers non-empty:
        expand one frontier by a single BFS step
        if a newly reached node already sits in the other frontier:
            return dist1[node] + dist2[node] + boundary offset
    return 0 if the frontiers never meet
  complexity: { time: "O(N * L^2)", space: "O(N * L)" }
