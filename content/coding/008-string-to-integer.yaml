id: leetcode-008-string-to-integer
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "8. String to Integer (atoi)"
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Scan the string as a small state machine: first skip leading spaces, then read an optional sign character."
  - "Consume digits while building result = result * 10 + digit, stopping as soon as you hit a non-digit character."
  - "Detect 32-bit overflow immediately after each multiply-and-add and clamp to INT_MAX or INT_MIN based on the sign, giving an O(n) single pass."
status: draft
answer:
  approach: >
    Scan the characters as a careful state machine: first skip leading spaces and read
    an optional +/- sign. Then consume digits, building the result as result * 10 + digit,
    stopping at the first non-digit. The tricky part is 32-bit overflow: after each
    multiply-and-add, detect that the accumulation wrapped and clamp to INT_MAX or
    INT_MIN according to the sign. Anything that isn't a valid prefix yields 0.
  pseudocode: |
    skip leading spaces
    read optional '+' / '-' -> sign
    result = 0
    while next char c is a digit:
        d = c - '0'
        result = result * 10 + d
        if overflow detected:
            return sign > 0 ? INT_MAX : INT_MIN
    return sign * result
  complexity: { time: "O(n)", space: "O(1)" }
