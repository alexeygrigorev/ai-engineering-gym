question: "45. Jump Game II"
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Picture each index as reachable from any earlier index whose jump range covers it. Think of the minimum jumps as a shortest path in this implicit graph."
  - "Process indices level by level as in BFS, where each level corresponds to one additional jump. Mark each index's distance the first time it becomes reachable."
  - "This BFS-by-levels (equivalently, greedily extending the current reach) gives the minimum jump count in O(n) time and O(n) space."
status: draft
answer:
  approach: >
    Treat indices as nodes: from index i you can reach any index up to i + nums[i], so
    the minimum number of jumps to the end is the shortest path in this graph. A BFS by
    levels finds it, one jump per level. Process indices in FIFO order, marking
    newly reachable indices with their distance (parent distance + 1). The first time you
    can reach or pass the last index, that distance + 1 is the answer. (Equivalently this is
    the greedy "extend the current reach as far as possible, then take a jump" idea.)
  pseudocode: |
    dist = [-1]*n; dist[0] = 0
    queue = [0]
    while queue:
        i = queue.pop_front()
        if i + nums[i] >= n-1: return dist[i] + 1
        for j from i + nums[i] down to i+1:
            if not visited[j]:
                dist[j] = dist[i] + 1; visited[j] = true; queue.push(j)
    return dist[n-1]
  complexity: { time: "O(n)", space: "O(n)" }
