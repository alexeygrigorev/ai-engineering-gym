id: aieng-reverse-linked-list
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: >
  Reverse a singly linked list in place. This was reported in an AI-assisted coding
  round (Microsoft Applied AI/ML): you may use an LLM, but the interviewer modifies
  the constraints mid-problem and watches how you re-prompt and verify. Give the
  iterative and recursive solutions and the constraint variants.
difficulty: easy
status: draft
ai_relevant: true
source_refs: [reddit-microsoft-aiml]
answer:
  approach: >
    Reverse the pointers in a single pass. Keep a prev pointer starting at null; for each
    node, save its next, point the node back to prev, then advance both prev and the
    cursor. When the cursor runs off the end, prev is the new head. This is O(n) time,
    O(1) space, and doesn't allocate new nodes. The recursive version reverses the tail
    first and then flips the link between the current node and its successor, at O(n)
    stack cost. In an AI-assisted round the code itself is easy — the signal is how you
    work: state the invariant (everything before prev is already reversed), verify the
    LLM's output against a tiny example, and when the interviewer adds a constraint
    ("O(1) space", "reverse only nodes m..n", "in groups of k") re-prompt precisely and
    check edge cases (empty list, single node) rather than pasting blindly.
  pseudocode: |
    # iterative, O(1) space
    def reverse(head):
        prev, node = None, head
        while node:
            nxt = node.next
            node.next = prev
            prev = node
            node = nxt
        return prev

    # recursive, O(n) stack
    def reverse_rec(node, prev=None):
        if node is None: return prev
        nxt = node.next
        node.next = prev
        return reverse_rec(nxt, node)
  complexity:
    time: "O(n)"
    space: "O(1) iterative; O(n) recursion stack"
hints:
  - "Track a prev pointer (start null). For each node: save next, repoint node.next to prev, then advance prev and the cursor."
  - "The invariant is that everything up to prev is already reversed; when the cursor is null, prev is the new head."
  - "In an AI-assisted round, verify the model's code on a 2-3 node example and re-prompt precisely when the interviewer adds a constraint (O(1) space, reverse m..n, groups of k)."
follow_ups:
