question: "6. Zigzag Conversion"
difficulty: medium
tags: [dsa]
ai_relevant: false
hints:
  - "Instead of building a full 2D grid, keep one output string buffer per row of the zigzag."
  - "Simulate the traversal by moving a row pointer down to the last row and then bouncing back up. Append each character to whichever row buffer it currently belongs to."
  - "Concatenating the row buffers at the end gives O(n) time and space. Handle numRows == 1 as a special case that returns the string unchanged."
status: draft
answer:
  approach: >
    Simulate the zigzag path instead of building a 2D grid, keeping one string buffer
    per row. Iterate over the characters, appending down through the rows to the last
    one, then bounce back up to row 1 and repeat. Each character gets appended to
    the buffer of its current row. At the end, concatenate the row buffers top to
    bottom. The single-row case is returned unchanged.
  pseudocode: |
    if numRows == 1: return s
    rows = array of numRows empty strings
    row = 0
    pos = 0
    while pos < len(s):
        while row < numRows and pos < len(s):     # go down
            rows[row] += s[pos]; row++; pos++
        row -= 2                                   # bounce
        while row > 0 and pos < len(s):            # go up diagonally
            rows[row] += s[pos]; row--; pos++
    return concat(rows)
  complexity: { time: "O(n)", space: "O(n)" }
