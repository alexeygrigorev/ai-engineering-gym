subtype: algorithm
question: "215. Kth Largest Element in an Array"
difficulty: medium
status: draft
answer:
  approach: >
    Quickselect. The k-th largest element sits at index n-k in sorted order;
    partition the array (Hoare partition) around a pivot and recurse only into
    the side that contains that target index, ignoring the other half. This
    averages O(n); a random shuffle first guards against adversarial worst-case
    inputs.
  pseudocode: |
    target = n - k
    select(lo, hi):
        if lo >= hi: return
        p = partition(a, lo, hi)
        if target <= p: select(lo, p)
        else: select(p+1, hi)
    shuffle(a); select(0, n-1); return a[target]
  complexity: { time: "O(n) average, O(n^2) worst", space: "O(1)" }
