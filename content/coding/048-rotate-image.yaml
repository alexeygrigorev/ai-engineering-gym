answer:
  approach: >
    Rotating an n x n matrix 90 degrees clockwise in place is transpose-then-reverse.
    First transpose the matrix (swap m[i][j] with m[j][i], touching only one triangle so
    each pair swaps once). Then reverse each row. The composition of those two O(n^2)
    passes is exactly the clockwise rotation, and it needs no extra matrix.
  pseudocode: |
    # transpose
    for i in 1..n-1:
        for j in 0..i-1:
            swap(m[i][j], m[j][i])
    # reverse each row
    for each row:
        reverse(row)
  complexity: { time: "O(n^2)", space: "O(1)" }
