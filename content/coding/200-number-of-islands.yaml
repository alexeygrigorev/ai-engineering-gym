question: "200. Number of Islands"
difficulty: medium
tags: [dsa]
ai_relevant: true
hints:
  - "Think of each island as a connected component of land cells in the grid."
  - "Scan every cell, and when you find an unvisited land cell, flood-fill outward over its four neighbors marking all connected land visited."
  - "Increment the island count once per flood-fill; each cell is visited only once, giving O(rows * cols) time."
status: draft
answer:
  approach: >
    Count the connected components of '1' (land) cells in the grid. Scan every
    cell; when an unvisited land cell is found, flood-fill from it (DFS or BFS
    over its four-directional neighbors) marking all reachable land as visited,
    and increment the island count. Each cell is visited once.
  pseudocode: |
    count = 0
    for each cell (i, j):
        if grid[i][j] == '1' and not visited:
            flood_fill(i, j)          # DFS/BFS marking connected land visited
            count += 1
    return count
  complexity: { time: "O(rows * cols)", space: "O(rows * cols)" }
follow_ups:
  - "Use union-find (disjoint set) instead of flood fill."
  - "Count islands as the grid is updated online (LeetCode 305)."
  - "How do you avoid recursion-depth overflow on very large grids?"
