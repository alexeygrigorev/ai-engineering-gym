id: aieng-excel-column-name
category: coding
skill: algorithms
type: coding
subtype: algorithm
question: "Excel column name"
description: |
  Given a positive integer, return its Excel column name (1 -> "A", 26 -> "Z",
  27 -> "AA", 702 -> "ZZ", 703 -> "AAA"). Reported in a Microsoft Applied AI/ML round.
difficulty: medium
status: draft
ai_relevant: true
source_refs: [reddit-microsoft-aiml]
answer:
  approach: >
    This is base-26 conversion, but bijective: letters A-Z map to 1-26, so there's no digit zero. The whole problem comes down to that off-by-one. In ordinary base-26 you'd take n % 26. Here you must subtract 1 first at each step so that a multiple of 26 (like 26 -> "Z") maps to the last letter rather than rolling over to a zero. Loop: decrement n by 1, take remainder = n % 26 to pick the letter
    chr(ord('A') + remainder), then n //= 26. Prepend letters because you generate the least-significant one first. The (n-1) adjustment is what makes 26 give "Z" and 27
    give "AA" instead of the naive "A0"/"BA".
  pseudocode: |
    def to_column(n):
        out = []
        while n > 0:
            n -= 1                         # shift to 0-based for the bijective system
            out.append(chr(ord('A') + n % 26))
            n //= 26
        return "".join(reversed(out))
  complexity:
    time: "O(log_26 n) — one iteration per output letter"
    space: "O(log_26 n) for the result string"
hints:
  - "Think base-26, but with no zero digit: A is 1, not 0. That's why plain n % 26 fails at 26, 52, 702, ..."
  - "Fix it by decrementing n by 1 at the start of each loop iteration before taking n % 26, then divide n by 26."
  - "You produce the least-significant letter first, so build the string in reverse (or prepend)."
follow_ups:
  - "Why is the (n-1) adjustment needed, and what breaks without it (test n = 26, 52, 702)?"
  - "Write the inverse: convert a column name like 'AAA' back to its number."
  - "How does this bijective base-26 differ from a standard positional base-26 with a zero?"
  - "How would you handle large column numbers that overflow a fixed-width integer?"
