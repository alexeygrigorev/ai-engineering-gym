id: conflict-with-teammate
category: behavioral
skill: conflict
type: rehearsal
question: "Tell me about a time you had a conflict with a teammate."
difficulty: medium
status: draft
source_refs: [exponent-openai, interviewnode, exponent-behavioral, igotanoffer-meta]
sources:
  - title: "Resume Genius — Answering 'Tell Me About a Time You Had a Conflict at Work'"
    url: "https://resumegenius.com/blog/interview/tell-me-about-a-time-you-had-a-conflict-at-work"
    supports: "STAR framing, common follow-up probes, and pitfalls (blaming, no resolution)"
  - title: "Big Interview — Conflict-Resolution Interview Questions and Answers"
    url: "https://resources.biginterview.com/behavioral-interviews/behavioral-interview-questions-conflict/"
    supports: "three pillars: STAR structure, conflict-resolution skills, what you learned"
  - title: "MIT CAPD — Using the STAR Method for Behavioral Interviews"
    url: "https://capd.mit.edu/resources/the-star-method-for-behavioral-interviews/"
    supports: "STAR = Situation, Task, Action, Result; weight the answer toward Action"

probes:
  - "What did you do differently from the other person, specifically?"
  - "How did you decide when to raise it versus let it go?"
  - "Whom did you talk to first, and why?"
  - "Did you involve your manager, and why or why not?"
  - "How did you keep it professional and avoid it escalating?"
  - "What was the measurable outcome, and what did you learn?"
  - "Looking back, what would you do differently?"

scaffold:
  format: STAR
  slots: [Situation, Task, Action, Result]

rubric:
  - "Situation is concrete: a real, specific disagreement with named context (project, deadline, decision)"
  - "Focuses on YOUR specific actions ('I proposed…', 'I asked…'), not what the team did"
  - "Shows conflict-resolution skills: listening to the other view, communicating your position, seeking common ground"
  - "Stays professional, doesn't blame or disparage the teammate"
  - "Result is positive and quantified where possible (shipped on time, hours saved, relationship preserved)"
  - "Ends with a reflection: what you learned or would do differently"

example_structure: |
  # Optional model STRUCTURE only — NOT a real personal story. Fill with your own.
  S (Situation): Set the scene: the project, the two of you, and the specific
     technical or process disagreement (e.g. two approaches to hitting a deadline).
  T (Task): What you owned and what was at stake (shipping on time, quality bar).
  A (Action): The concrete steps YOU took: heard the other view, laid out
     trade-offs, proposed a structured way to decide (e.g. a short review), reached
     a shared decision without escalating.
  R (Result): The outcome, quantified if you can (delivered on time, X hours saved,
     relationship intact) plus one sentence on what you learned.

# The user's own answer is captured per-user at runtime, NOT stored in this file.
