id: lead-under-uncertainty
category: behavioral
skill: ambiguity
type: rehearsal
question: "How do you lead under risk and uncertainty? Tell me about a time you did."
difficulty: hard
status: draft
source_refs: [prachub-anthropic]
sources:
  - title: "MIT CAPD — Using the STAR Method for Behavioral Interviews"
    url: "https://capd.mit.edu/resources/the-star-method-for-behavioral-interviews/"
    supports: "STAR = Situation, Task, Action, Result; weight the answer toward Action"
  - title: "Amazon — Leadership Principles (Bias for Action; Dive Deep)"
    url: "https://www.amazon.jobs/content/en/our-workplace/leadership-principles"
    supports: "acting decisively under uncertainty when many decisions are reversible"
  - title: "Big Interview — Behavioral Interview Questions and Answers"
    url: "https://resources.biginterview.com/behavioral-interviews/"
    supports: "show a decision process: reducing ambiguity, making calls, adjusting as you learn"

probes:
  - "What made the situation uncertain: unknown data, new tech, shifting requirements?"
  - "How did you decide when you had enough information to act?"
  - "How did you keep the team moving without false certainty?"
  - "What was your plan if your bet was wrong?"
  - "How did you communicate the risk upward and to the team?"
  - "How did it turn out, and what did you learn about deciding under uncertainty?"

scaffold:
  format: STAR
  slots: [Situation, Task, Action, Result]

rubric:
  - "Situation is genuinely ambiguous: unclear requirements, unproven approach, or incomplete data (common in AI/ML work)"
  - "Task shows you were responsible for moving forward despite the fog"
  - "Action centers on YOUR process: framing assumptions, de-risking with small experiments, making reversible bets, communicating uncertainty honestly"
  - "Shows decisiveness balanced with adaptability: not paralysis, not recklessness"
  - "Result: progress or a good outcome despite the risk, and how you course-corrected"
  - "Reflection on a repeatable approach to leading under uncertainty"

example_structure: |
  # STAR SKELETON — NOT a real personal story. Fill with your own.
  S (Situation): A project with major unknowns (e.g. whether an LLM approach would
     even meet the quality bar, or fast-moving requirements).
  T (Task): What you owned: keep the team progressing and make good calls.
  A (Action): The concrete steps YOU took: named the key uncertainties, ran cheap
     experiments to reduce them, made reversible decisions, set checkpoints,
     communicated risk transparently.
  R (Result): The outcome and how you adapted as you learned, plus a one-line
     lesson on deciding under uncertainty.

hints:
  - "Name the specific unknowns: vague 'it was uncertain' undersells the challenge."
  - "Show a method: de-risk cheaply, make reversible bets, set checkpoints, communicate honestly."
  - "Highlight a course-correction: leading under uncertainty means adapting as data arrives."

# The user's own answer is captured per-user at runtime, NOT stored in this file.
