id: ai-solution-failed
category: behavioral
skill: failure
type: rehearsal
question: "Describe a project that didn't go as planned or where your AI solution failed."
difficulty: medium
status: draft
source_refs: [interviewquery-anthropic, educative-deepmind]
sources:
  - title: "MIT CAPD — Using the STAR Method for Behavioral Interviews"
    url: "https://capd.mit.edu/resources/the-star-method-for-behavioral-interviews/"
    supports: "STAR = Situation, Task, Action, Result; weight the answer toward Action"
  - title: "Amazon — Leadership Principles (Dive Deep; Earn Trust)"
    url: "https://www.amazon.jobs/content/en/our-workplace/leadership-principles"
    supports: "root-causing failures and owning them transparently"
  - title: "Big Interview — Behavioral Interview Questions and Answers"
    url: "https://resources.biginterview.com/behavioral-interviews/"
    supports: "failure answers should show diagnosis, recovery, and a concrete lesson"

probes:
  - "What was the AI solution supposed to do, and how did you define success?"
  - "How did the failure show up — offline metrics, production, or user feedback?"
  - "What was the root cause: data, evaluation gap, distribution shift, or wrong problem framing?"
  - "How did you catch it, and how quickly?"
  - "What did you do to recover or contain the impact?"
  - "What changed in how you build and evaluate AI systems afterward?"

scaffold:
  format: STAR
  slots: [Situation, Task, Action, Result]

rubric:
  - "Situation describes a concrete AI/ML solution and its intended goal"
  - "Names the failure honestly and how it surfaced (metric, incident, user harm)"
  - "Action shows AI-specific diagnosis: data issues, eval blind spots, train/serve skew, hallucination, distribution shift"
  - "Takes ownership and shows containment/recovery, not just a post-mortem"
  - "Result: what improved and the durable change (better eval, monitoring, guardrails, tighter problem framing)"
  - "Reflection shows AI maturity — treating failures as evaluation and process gaps"

example_structure: |
  # STAR SKELETON — NOT a real personal story. Fill with your own.
  S (Situation): An AI feature/model with a clear goal (e.g. a classifier, a RAG
     assistant, a recommendation) that underperformed in production.
  T (Task): What you owned and how success was defined.
  A (Action): The concrete steps YOU took — diagnosed the root cause (data, eval,
     drift, framing), contained user impact, and fixed the underlying gap.
  R (Result): The recovery and the durable improvement to your eval/monitoring/
     guardrails, plus a one-line lesson on building reliable AI.

hints:
  - "Show AI-specific depth: point at data, evaluation, or drift, not just 'a bug'."
  - "Own the miss, then emphasize diagnosis and the systemic fix (better eval/monitoring)."
  - "Frame the lesson as improved rigor, which is exactly what AI interviewers probe for."

# The user's own answer is captured per-user at runtime, NOT stored in this file.
