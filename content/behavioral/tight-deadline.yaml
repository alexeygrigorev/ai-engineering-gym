id: tight-deadline
category: behavioral
skill: ownership
type: rehearsal
question: "Tell me about a time when you worked on a project with a tight deadline."
difficulty: medium
status: draft
source_refs: [exponent-behavioral]
sources:
  - title: "MIT CAPD — Using the STAR Method for Behavioral Interviews"
    url: "https://capd.mit.edu/resources/the-star-method-for-behavioral-interviews/"
    supports: "STAR = Situation, Task, Action, Result; weight the answer toward Action"
  - title: "Indeed — How To Use the STAR Interview Response Technique"
    url: "https://www.indeed.com/career-advice/interviewing/how-to-use-the-star-interview-response-technique"
    supports: "structure a pressure story around a concrete situation and measurable result"
  - title: "Amazon — Leadership Principles (Deliver Results; Bias for Action)"
    url: "https://www.amazon.jobs/content/en/our-workplace/leadership-principles"
    supports: "prioritizing ruthlessly and delivering key outcomes under time pressure"

probes:
  - "What made the deadline tight: scope, dependencies, or a hard external date?"
  - "How did you decide what to cut or defer?"
  - "How did you keep quality acceptable under pressure?"
  - "How did you coordinate others to hit it?"
  - "Did you make the deadline, and what did it cost? Was it worth it?"
  - "What would you do to avoid the crunch next time?"

scaffold:
  format: STAR
  slots: [Situation, Task, Action, Result]

rubric:
  - "Situation establishes concrete time pressure (hard launch date, incident, customer commitment)"
  - "Task shows what had to ship and the constraints"
  - "Action centers on YOUR prioritization: scoping down, sequencing, unblocking, protecting quality where it mattered"
  - "Shows judgment, not just heroics or unsustainable overwork"
  - "Result: delivered on time with an honest account of trade-offs, quantified"
  - "Reflection on planning to reduce future crunch"

example_structure: |
  # STAR SKELETON — NOT a real personal story. Fill with your own.
  S (Situation): A hard deadline with more scope than time (e.g. a demo, launch,
     or customer commitment).
  T (Task): What you owned: decide what ships and make the date safely.
  A (Action): The concrete steps YOU took: cut scope to the essential, sequenced
     the work, unblocked dependencies, protected the critical quality bar,
     communicated status early.
  R (Result): Delivered on time with clear trade-offs, quantified, plus a one-line
     lesson on prioritization and planning.

hints:
  - "The signal here is prioritization under pressure: show what you cut and why."
  - "Avoid glorifying all-nighters, and favor smart scoping over heroics."
  - "Give an honest Result including trade-offs, and a lesson on avoiding the crunch."

# The user's own answer is captured per-user at runtime, NOT stored in this file.
