id: convinced-someone-change-mind
category: behavioral
skill: conflict
type: rehearsal
question: "Tell me about a time you convinced someone to change their mind."
difficulty: medium
status: draft
source_refs: [exponent-behavioral]
sources:
  - title: "MIT CAPD — Using the STAR Method for Behavioral Interviews"
    url: "https://capd.mit.edu/resources/the-star-method-for-behavioral-interviews/"
    supports: "STAR = Situation, Task, Action, Result; weight the answer toward Action"
  - title: "Big Interview — Behavioral Interview Questions and Answers"
    url: "https://resources.biginterview.com/behavioral-interviews/"
    supports: "persuasion answers should show evidence, listening, and a respectful outcome"
  - title: "Amazon — Leadership Principles (Have Backbone; Disagree and Commit)"
    url: "https://www.amazon.jobs/content/en/our-workplace/leadership-principles"
    supports: "disagree respectfully with data, then commit fully once a decision is made"

probes:
  - "What was the disagreement, and what was at stake if it went the wrong way?"
  - "What evidence or reasoning did you bring?"
  - "How did you understand their position before pushing yours?"
  - "Was there a moment they started to shift, and what caused it?"
  - "What if you had been the one who was wrong, how open were you to that?"
  - "What was the result, and did the relationship stay intact?"

scaffold:
  format: STAR
  slots: [Situation, Task, Action, Result]

rubric:
  - "Situation is a concrete decision where you disagreed with someone (peer, lead, manager)"
  - "Shows you understood their view first: persuasion by listening, not steamrolling"
  - "Action centers on YOUR approach: data, a prototype, a small experiment, reframing the trade-off"
  - "Demonstrates intellectual honesty: you were open to being wrong yourself"
  - "Result: the mind changed AND the decision was better, ideally quantified, and the relationship preserved"
  - "Reflection on influencing without authority"

example_structure: |
  # STAR SKELETON — NOT a real personal story. Fill with your own.
  S (Situation): A technical or product decision where someone favored a different
     approach than the evidence supported (e.g. build vs. buy, model choice).
  T (Task): What you owned: get to the right decision without damaging the
     relationship.
  A (Action): The concrete steps YOU took: heard their reasoning, ran a small
     experiment or gathered data, presented the trade-off in their terms, stayed
     open to changing your own mind.
  R (Result): The decision changed and produced a measurable win (cost, latency,
     quality) plus a one-line lesson on influencing with evidence.

hints:
  - "Show you earned the right to persuade by understanding their view first."
  - "Show the pivot as a prototype, a benchmark, a number that shifted the room."
  - "Signal you'd have committed to their call if the data went the other way."

